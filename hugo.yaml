baseURL: https://example.org/
publishDir: docs
languageCode: en-us
title: DFIR-OGRE documentation
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true

params:
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: full

  theme:
    # light | dark | system
    default: light
    displayToggle: false

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: normal

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo_ogre.svg
      dark: images/logo_ogre.svg
      link: /
      width: 40
      height: 20
menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search
    - name: GitHub
      weight: 2
      url: "https://github.com/ANSSI-FR/dfir-ogre"
      params:
        icon: github

    - name: Theme Toggle
      weight: 3
      params:
        type: theme-toggle
        label: false
